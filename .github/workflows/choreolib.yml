name: ChoreoLib Java

on: [push, pull_request]

jobs:
  java:
    name: Java Maven
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Determine publish version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF##*v}"
          else
            version="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish Java Maven artifacts
        working-directory: choreolib
        run: >-
          ./gradlew publishJavaPublicationToMavenRepository
          -x test
          -PpubVersion=${{ steps.version.outputs.version }}
          -PartifactGroupId=com.pantherbotics.choreo

      - name: Stage Maven repo for vendor dependency hosting
        shell: bash
        run: |
          rm -rf choreolib/dep
          mkdir -p choreolib/dep
          cp -r choreolib/build/repos/releases/* choreolib/dep/

      - uses: actions/upload-artifact@v6
        with:
          name: ChoreoLib-Java-Maven
          path: choreolib/dep

      - uses: actions/upload-artifact@v6
        with:
          name: ChoreoLib-json
          path: choreolib/ChoreoLib2026PantherJava.json
